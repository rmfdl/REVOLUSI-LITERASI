<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- Boostrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Link Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="container">
      <div class="containerLogin">
        <div class="conRaight">
          <h2 style="padding-top: 15px">Sign In</h2>
          <div
            style="
              display: flex;
              padding-bottom: 15px;
              gap: 10px;
              font-size: 18px;
            "
          >
            <i class="fa-brands fa-google"></i>
            <i class="fa-brands fa-facebook"></i
            ><i class="fa-brands fa-square-twitter"></i>
          </div>
          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control"
              id="floatingInput"
              placeholder="name@example.com"
            />
            <label for="floatingInput">Email address</label>
          </div>
          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="floatingPassword"
              placeholder="Password"
            />
            <label for="floatingPassword">Password</label>
          </div>
          <p style="padding: 5px">Forget Your Password</p>
          <button type="button" class="btn btn-warning">Warning</button>
        </div>
        <div class="conLeft">
          <h2>Register</h2>
          <h2>Hello Friend....</h2>
          <div style="display: flex; padding: 15px; gap: 10px; font-size: 18px">
            <i class="fa-brands fa-google"></i>
            <i class="fa-brands fa-facebook"></i
            ><i class="fa-brands fa-square-twitter"></i>
          </div>
          <p style="font-size: 18px; text-align: justify">
            If you don't have a literacy revolution account, please register
            with social media or register with the button below.
          </p>
          <button type="button" class="btn btn-light">Register</button>
        </div>
      </div>
    </div>

    <footer class="bg-body-tertiary">
      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 10px;
          box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.5);
        "
      >
        <p>
          © 2026 Copyright: Hactive8 Batch 96 Ai Enhandched Full Stack Developer
        </p>
      </div>
    </footer>

    <script src="../component/navbar.js"></script>
  </body>
</html>
